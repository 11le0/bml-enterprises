<!DOCTYPE html>
<html>
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <title>Our Services</title>
    <link rel="icon" type="image/png" href="logo.png">
    <style>
      
      body {
  font-family: 'Montserrat';
  font-weight: 400;
  color:white;
  background-color:#1e1e1e;
}

h1, h2, h3, h4, h5 {
  font-family: 'Montserrat';
  font-weight: 700;
}

html {font-size: 100%;}
h1 {font-size: 5.652rem;}
h2 {font-size: 3.997rem;}
h3 {font-size: 2.827rem;}
h4 {font-size: 1.999rem;}
h5 {font-size: 1.414rem;}
small {font-size: 0.707rem;}

footer{
  text-align: center;
  
  .button {
text-decoration: none;
display: inline-block;
text-align: center;
background-color: #2e8b57;
color:white;
padding: 12px 24px;
margin: 8px;
border-radius: 8px;
font-family: 'Montserrat', sans-serif;
transition: background 0.3s ease;
}

.button:hover {
background-color: #54ba17d;
}

  .grid-container {
  display: grid;
  grid-template-columns: repeat(3, 1fr); 
  grid-template-rows: repeat(2, 1fr);
  gap: 20px;
}

}</style>
  </head>
  <body>
    <h1>Our Services</h1>
    <h2>Manual Labor Tasks</h2>
    <div class="grid-container">
      <h4 style="grid-column: 1 / 1; grid-row: 1 / 2">Raking Leaves</h4>
      <h4 style="grid-column: 2 / 2; grid-row: 1 / 2">Backyard Cleaning</h4>
      <h4 style="grid-column: 3 / 3; grid-row: 1 / 2">Grass Mowing</h4>
    </div>
  </body>
